<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Landing page for a coding agency offering services in web development.">
    <title>Coding Agency Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Coding Agency</h1>
        <p>Your partner in web development</p>
    </header>
    <main>
        <section id="task-section">
            <h2>Task List</h2>
            <input type="text" id="task-input" placeholder="Add a new task..." />
            <button id="add-task-btn">Add Task</button>
            <ul id="task-list"></ul>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 Coding Agency. All rights reserved.</p>
    </footer>
    <script src="app.js"></script>
</body>
</html>
